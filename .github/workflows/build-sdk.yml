name: Build WeChatFerry SDK

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-sdk:
    runs-on: windows-latest

    steps:
      - name: Checkout docker-wechatferry
        uses: actions/checkout@v4

      - name: Clone KeJunMao/WeChatFerry
        run: git clone --depth=1 https://github.com/KeJunMao/WeChatFerry WeChatFerry-src
        shell: pwsh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install grpcio-tools protobuf setuptools nanopb
        shell: pwsh

      # ── Generate protobuf files BEFORE MSBuild ────────────────────────────
      # Use nanopb's installed protoc-gen-nanopb directly with grpc_tools.protoc
      # instead of the bundled wrapper script (which has pkg_resources issues).
      - name: Generate wcf.pb.c / wcf.pb.h (nanopb)
        run: |
          $protoDir = "WeChatFerry-src\WeChatFerry\rpc\proto"
          $toolDir = "WeChatFerry-src\WeChatFerry\rpc\tool"

          # Find nanopb's protoc-gen-nanopb plugin
          $nanopbPlugin = python -c "import nanopb; import os; print(os.path.join(os.path.dirname(nanopb.__file__), 'generator', 'protoc-gen-nanopb.bat'))"
          Write-Host "nanopb plugin: $nanopbPlugin"

          # If that doesn't work, fall back to the bundled one
          if (-not (Test-Path $nanopbPlugin)) {
            $nanopbPlugin = "$($PWD)\$toolDir\protoc-gen-nanopb.bat"
            Write-Host "Falling back to bundled plugin: $nanopbPlugin"
          }

          # Use grpc_tools.protoc directly (avoids the pkg_resources import chain)
          Push-Location $protoDir
          python -m grpc_tools.protoc `
            "--plugin=protoc-gen-nanopb=$nanopbPlugin" `
            "--nanopb_out=." `
            "-I." `
            wcf.proto

          Write-Host "Generated files:"
          Get-ChildItem . | Select-Object Name
          Pop-Location
        shell: pwsh
        working-directory: ${{ github.workspace }}

      - name: Patch vcxproj — disable pre-build protoc events
        # Avoids double-run / failure of pre-build step during MSBuild
        run: |
          $files = @(
            "WeChatFerry-src\WeChatFerry\spy\Spy.vcxproj",
            "WeChatFerry-src\WeChatFerry\sdk\SDK.vcxproj"
          )
          foreach ($f in $files) {
            if (Test-Path $f) {
              $content = Get-Content $f -Raw
              # Replace PreBuildEvent Command content with a no-op echo
              $content = $content -replace '(<Command>)[^<]*(protoc[^<]*)(</Command>)', '$1echo Protoc already done$3'
              Set-Content $f $content
              Write-Host "Patched $f"
            }
          }
        shell: pwsh
        working-directory: ${{ github.workspace }}

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: C:\Tools\vcpkg
          key: vcpkg-nng-magic-enum-x64-windows-static-${{ runner.os }}-v3

      - name: Install vcpkg and dependencies
        run: |
          if (-not (Test-Path "C:\Tools\vcpkg")) {
            New-Item -ItemType Directory -Force -Path "C:\Tools" | Out-Null
            git clone https://github.com/microsoft/vcpkg.git C:\Tools\vcpkg
            C:\Tools\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          }
          C:\Tools\vcpkg\vcpkg.exe install nng:x64-windows-static magic-enum:x64-windows-static --recurse
        shell: pwsh

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build WeChatFerry (Release|x64)
        run: |
          msbuild "WeChatFerry-src\WeChatFerry\WeChatFerry.sln" `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:VcpkgRoot="C:\Tools\vcpkg" `
            /p:VCPKG_ROOT="C:\Tools\vcpkg" `
            /m `
            /v:minimal
        shell: pwsh
        working-directory: ${{ github.workspace }}

      - name: Collect and verify build outputs
        id: collect
        run: |
          # MSBuild outputs to x64/Release by default
          $searchRoot = "WeChatFerry-src\WeChatFerry"
          Write-Host "=== Searching for DLLs ==="
          Get-ChildItem -Path $searchRoot -Recurse -Filter "*.dll" |
            Select-Object FullName, Length

          $sdk = Get-ChildItem -Path $searchRoot -Recurse -Filter "sdk.dll" |
            Select-Object -First 1 -ExpandProperty FullName
          $spy = Get-ChildItem -Path $searchRoot -Recurse -Filter "spy.dll" |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $sdk) { throw "sdk.dll not found after build" }
          if (-not $spy) { throw "spy.dll not found after build" }

          Write-Host "sdk.dll: $sdk"
          Write-Host "spy.dll: $spy"

          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item $sdk release\sdk.dll
          Copy-Item $spy release\spy.dll

          $sdkHash = (Get-FileHash release\sdk.dll -Algorithm SHA256).Hash.ToLower()
          $spyHash = (Get-FileHash release\spy.dll -Algorithm SHA256).Hash.ToLower()

          "$sdkHash  sdk.dll`n$spyHash  spy.dll" | Set-Content -Encoding ASCII release\checksums.sha256
          "$sdkHash  sdk.dll" | Set-Content -Encoding ASCII release\sdk.dll.sha256
          "$spyHash  spy.dll"  | Set-Content -Encoding ASCII release\spy.dll.sha256

          Write-Host "sdk.dll SHA256: $sdkHash"
          Write-Host "spy.dll SHA256: $spyHash"

          echo "SDK_HASH=$sdkHash" >> $env:GITHUB_OUTPUT
          echo "SPY_HASH=$spyHash" >> $env:GITHUB_OUTPUT
        shell: pwsh
        working-directory: ${{ github.workspace }}

      - name: Upload DLL artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wechatferry-sdk-${{ github.sha }}
          path: |
            release/sdk.dll
            release/spy.dll
            release/checksums.sha256
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/sdk.dll
            release/spy.dll
            release/checksums.sha256
          body: |
            ## WeChatFerry SDK — ${{ github.ref_name }}

            Built from [KeJunMao/WeChatFerry](https://github.com/KeJunMao/WeChatFerry).

            | File | SHA256 |
            |------|--------|
            | `sdk.dll` | `${{ steps.collect.outputs.SDK_HASH }}` |
            | `spy.dll` | `${{ steps.collect.outputs.SPY_HASH }}` |

            ### Verify
            ```bash
            sha256sum -c checksums.sha256
            ```

            ### Usage
            Place `sdk.dll` and `spy.dll` in the same directory, then call `WxInitSDK(port)`.
          draft: false
          prerelease: false
